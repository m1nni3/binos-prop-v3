<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="Property Trust Management System">
  <title>Binos Properties — POMP</title>
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="output.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" async></script>
  <style>
    .app-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f1f5f9; }
    .app-loading > div { text-align: center; }
    .app-loading .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-binos-light font-sans text-binos-navy antialiased">
  <div id="app">
    <div class="app-loading">
      <div>
        <div class="spinner"></div>
        <div class="text-sm text-binos-gray font-medium">Loading POMP...</div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
